<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI采购比价分析工具</title>
<style>
body{margin:30px;font-family:微软雅黑;}
.box{max-width:900px;margin:0 auto;}
input{width:100%;margin:8px 0;padding:10px;font-size:15px;}
button{background:#059669;color:white;border:none;padding:12px 30px;font-size:16px;margin:15px 0;border-radius:6px;}
#res{border:1px solid #ccc;padding:15px;min-height:200px;white-space:pre-wrap;}
</style>
</head>
<body>
<div class="box">
    <h2>AI 采购比价分析工具（脱敏版）</h2>
    <p>仅填写价格，无需真实供应商名称</p>
    <input id="p1" placeholder="供应商A报价（元）">
    <input id="p2" placeholder="供应商B报价（元）">
    <input id="p3" placeholder="供应商C报价（元）">
    <button onclick="compare()">AI自动比价分析</button>
    <h3>AI比价分析结果：</h3>
    <div id="res"></div>
</div>

<script>
function compare(){
    let a = Number(document.getElementById('p1').value);
    let b = Number(document.getElementById('p2').value);
    let c = Number(document.getElementById('p3').value);
    let minVal = Math.min(a,b,c);
    let ans = `【AI采购比价分析报告】
供应商A报价：${a} 元
供应商B报价：${b} 元
供应商C报价：${c} 元

最低报价：${minVal} 元

AI分析建议：
1、优先参考最低价供应商洽谈合作；
2、结合交付周期、产品质量综合判定；
3、可作为采购议价参考依据，降低采购成本。`;
    document.getElementById('res').innerText = ans;
}
</script>
</body>
</html>
